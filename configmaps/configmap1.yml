---
apiVersion: v1
kind: Pod
metadata:
  name: pod2
spec:
  containers:
    - name: cont1
      image: httpd
      ports:
        - containerPort: 80

      env:
        - name: env1
          valueFrom:
            configMapKeyRef:
              name: cm1
              key: name
        - name: env2
          valueFrom:
            configMapKeyRef:
              - name: cm2
                key: place     
